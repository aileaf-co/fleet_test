---
# OpenClaw agent — installed + configured + clean-removed by the moum-ops cascade.
#
# `state` (present|absent) is injected by the reconciler via --extra-vars.
# Idempotent by construction:
#   - community.general.npm converges on `state` (no-op if already there)
#   - .env keys are content-idempotent (lineinfile + regexp)
#   - MEMORY.md is content-idempotent (copy with literal content)
#   - removal is absent=no-op when the directory is already gone
# A second run with the same state reports changed=0.
#
# Node.js (>= 22.19) is provided by the sandbox image — this playbook
# installs the agent itself and writes the operator-facing config files.
- name: OpenClaw agent ({{ state | default('present') }})
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openclaw_home: "{{ lookup('env', 'HOME') }}/.openclaw"
  tasks:
    - name: OpenClaw npm package
      community.general.npm:
        name: openclaw
        global: true
        state: "{{ state }}"

    # ── Environment configuration (when state=present) ──────────────────────
    - name: OpenClaw .env — OPENAI_API_KEY
      ansible.builtin.lineinfile:
        path: "{{ openclaw_home }}/.env"
        regexp: '^OPENAI_API_KEY='
        line: "OPENAI_API_KEY={{ openclaw_openai_api_key | default('') }}"
        create: true
        mode: '0600'
      when: state == 'present'

    - name: OpenClaw .env — ANTHROPIC_API_KEY
      ansible.builtin.lineinfile:
        path: "{{ openclaw_home }}/.env"
        regexp: '^ANTHROPIC_API_KEY='
        line: "ANTHROPIC_API_KEY={{ openclaw_anthropic_api_key | default('') }}"
        create: true
        mode: '0600'
      when: state == 'present'

    - name: OpenClaw long-term memory scaffold (MEMORY.md)
      ansible.builtin.copy:
        dest: "{{ openclaw_home }}/MEMORY.md"
        mode: '0644'
        content: |
          # OpenClaw Long-term Memory

          > Provisioned by the moum-ops Ansible cascade
          > (`_fleet/playbooks/openclaw.yml`). Entries persist across sessions.

          ## Operator Context
          - Deployment: moum-ops fleet (see `daemon.yaml::gitops`).
          - Cascade tier: fleet-root (`_fleet/software.yaml`).
          - Config dir: `~/.openclaw/` (`.env` for keys; this file for notes).

          ## Long-term Notes
          (Add persistent context here — preferred providers, project shortcuts, etc.)
      when: state == 'present'

    # ── Clean removal (when state=absent) ───────────────────────────────────
    - name: OpenClaw clean removal — config directory
      ansible.builtin.file:
        path: "{{ openclaw_home }}"
        state: absent
      when: state == 'absent'

    # ── Verify (when state=present) ─────────────────────────────────────────
    - name: Verify OpenClaw is runnable
      ansible.builtin.command: openclaw --version
      changed_when: false
      when: state == 'present'
