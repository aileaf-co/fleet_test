---
# Hermes Agent (Nous Research) — installed/removed by the moum-ops cascade.
#
# `state` (present|absent) is injected by the reconciler via --extra-vars.
# The official installer clones the repo and installs via uv. Root install
# layout: command /usr/local/bin/hermes, code /usr/local/lib/hermes-agent,
# data ~/.hermes (HERMES_HOME).
#
# Idempotency: a probe task checks whether `hermes` already runs and skips
# the installer when it does — path-independent (works root and non-root).
# Clean removal wipes command + code + HERMES_HOME.
#
# uv is provided by the sandbox image.
- name: Hermes agent ({{ state | default('present') }})
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    hermes_home: "{{ lookup('env', 'HOME') }}"
    hermes_paths:
      - /usr/local/bin/hermes
      - /usr/local/lib/hermes-agent
      - "{{ hermes_home }}/.hermes"
      - "{{ hermes_home }}/.local/bin/hermes"
      - "{{ hermes_home }}/.local/lib/hermes-agent"
  tasks:
    - name: Probe — is Hermes already installed?
      ansible.builtin.command: hermes --version
      register: hermes_probe
      changed_when: false
      failed_when: false
      when: state == 'present'

    - name: Install Hermes agent (official installer — only when absent)
      ansible.builtin.shell: >
        curl -fsSL
        https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh
        | bash -s -- --skip-setup
      args:
        executable: /bin/bash
      when:
        - state == 'present'
        - hermes_probe.rc | default(1) != 0

    - name: Verify Hermes is runnable
      ansible.builtin.command: hermes --version
      changed_when: false
      when: state == 'present'

    - name: Hermes clean removal — command + code + HERMES_HOME
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ hermes_paths }}"
      when: state == 'absent'
