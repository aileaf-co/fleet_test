---
# Secrets toolchain — installs sops + age binaries.
#
# `state` (present|absent) is injected by the reconciler via --extra-vars.
# Idempotent:
#   - get_url default `force: false` skips when dest exists
#   - get_url verifies sha256 checksum (integrity)
#   - unarchive `creates:` guards a second extraction
#   - clean removal via `file: state=absent`
#
# Architecture: aarch64 (Apple Silicon Linux microVMs, ARM Linux hosts) and
# x86_64 supported via ansible_architecture mapping.
- name: Secrets toolchain — sops + age ({{ state | default('present') }})
  hosts: localhost
  connection: local
  gather_facts: true        # needs ansible_architecture for arch mapping
  vars:
    sops_version: "3.12.1"
    age_version: "1.3.1"
    # Per-arch binary names + sha256 checksums (Cycle 1 F1 fix —
    # download integrity verification). Compute new checksums when
    # bumping versions.
    arch_data:
      x86_64:
        bin: amd64
        sops_sha256: cf3136d20a6004405c986a48e179c3c7a731f777fbf105a37bd5dac5c9047100
        age_sha256:  bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377
      aarch64:
        bin: arm64
        sops_sha256: c7904d07bf1fb3ffdc329b0103ce70ff6a884aa7af7931427402bea0c09cc522
        age_sha256:  c6878a324421b69e3e20b00ba17c04bc5c6dab0030cfe55bf8f68fa8d9e9093a
    arch: "{{ arch_data[ansible_architecture] }}"
    age_archive: "/tmp/age-v{{ age_version }}-linux-{{ arch.bin }}.tar.gz"
  tasks:
    # ── Install (state=present) ─────────────────────────────────────────────
    - name: Download sops binary (sha256-verified)
      ansible.builtin.get_url:
        url: "https://github.com/getsops/sops/releases/download/v{{ sops_version }}/sops-v{{ sops_version }}.linux.{{ arch.bin }}"
        dest: /usr/local/bin/sops
        mode: '0755'
        checksum: "sha256:{{ arch.sops_sha256 }}"
      when: state == 'present'

    - name: Download age archive (sha256-verified)
      ansible.builtin.get_url:
        url: "https://github.com/FiloSottile/age/releases/download/v{{ age_version }}/age-v{{ age_version }}-linux-{{ arch.bin }}.tar.gz"
        dest: "{{ age_archive }}"
        mode: '0644'
        checksum: "sha256:{{ arch.age_sha256 }}"
      when: state == 'present'

    - name: Extract age + age-keygen
      ansible.builtin.unarchive:
        src: "{{ age_archive }}"
        dest: /usr/local/bin
        remote_src: true              # archive is on target host (downloaded above)
        extra_opts: ['--strip-components=1', 'age/age', 'age/age-keygen']
        creates: /usr/local/bin/age
      when: state == 'present'

    - name: Verify sops
      ansible.builtin.command: sops --version
      changed_when: false
      when: state == 'present'

    - name: Verify age
      ansible.builtin.command: age --version
      changed_when: false
      when: state == 'present'

    # ── Clean removal (state=absent) ────────────────────────────────────────
    - name: Clean removal — sops + age binaries + downloaded archive
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/sops
        - /usr/local/bin/age
        - /usr/local/bin/age-keygen
        - "{{ age_archive }}"
      when: state == 'absent'
