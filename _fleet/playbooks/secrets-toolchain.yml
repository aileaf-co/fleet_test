---
# Secrets toolchain — installs sops + age binaries.
#
# `state` (present|absent) is injected by the reconciler via --extra-vars.
# Idempotent: get_url skips when dest exists (force:false default);
# unarchive skips via `creates:`; clean removal via `file: state=absent`.
#
# Architecture: aarch64 (Apple Silicon Linux microVMs, ARM Linux hosts) and
# x86_64 supported via ansible_architecture mapping.
- name: Secrets toolchain — sops + age ({{ state | default('present') }})
  hosts: localhost
  connection: local
  gather_facts: true        # needs ansible_architecture for arch mapping
  vars:
    sops_version: "3.12.1"
    age_version: "1.3.1"
    arch_map:
      x86_64: amd64
      aarch64: arm64
    bin_arch: "{{ arch_map[ansible_architecture] | default('amd64') }}"
  tasks:
    # ── Install (state=present) ─────────────────────────────────────────────
    - name: Download sops binary
      ansible.builtin.get_url:
        url: "https://github.com/getsops/sops/releases/download/v{{ sops_version }}/sops-v{{ sops_version }}.linux.{{ bin_arch }}"
        dest: /usr/local/bin/sops
        mode: '0755'
      when: state == 'present'

    - name: Extract age binaries (age + age-keygen)
      ansible.builtin.unarchive:
        src: "https://github.com/FiloSottile/age/releases/download/v{{ age_version }}/age-v{{ age_version }}-linux-{{ bin_arch }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts: ['--strip-components=1', 'age/age', 'age/age-keygen']
        creates: /usr/local/bin/age
      when: state == 'present'

    - name: Verify sops
      ansible.builtin.command: sops --version
      changed_when: false
      when: state == 'present'

    - name: Verify age
      ansible.builtin.command: age --version
      changed_when: false
      when: state == 'present'

    # ── Clean removal (state=absent) ────────────────────────────────────────
    - name: Clean removal — sops + age binaries
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/sops
        - /usr/local/bin/age
        - /usr/local/bin/age-keygen
      when: state == 'absent'
